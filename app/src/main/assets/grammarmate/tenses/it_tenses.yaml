tenses:
  - name: "Presente"
    short: "Pres."
    formula: "Основа глагола + окончания: -o, -i, -a, -iamo, -ate, -ano (I спр.); -o, -i, -e, -iamo, -ite, -ono (II спр.)"
    usage_ru: "Текущие, регулярные и привычные действия. Основное настоящее время, покрывает как 'я делаю', так и 'я делаю обычно'. Часто используется с ogni giorno, sempre, di solito."
    examples:
      - it: "Io mangio la pasta."
        ru: "Я ем пасту."
        note: "Регулярное действие в настоящем"
      - it: "Lavoro a Roma."
        ru: "Я работаю в Риме."
        note: "Постоянное состояние"
      - it: "Ogni mattina bevo un caffè."
        ru: "Каждое утро я пью кофе."
        note: "Привычное действие"

  - name: "Imperfetto"
    short: "Imperf."
    formula: "Основа + -avo, -avi, -ava, -avamo, -avate, -avano (I спр.); -evo, -evi, -eva, -evamo, -evate, -evano (II спр.)"
    usage_ru: "Длительные, повторяющиеся действия в прошлом и фоновые описания. Не акцентирует завершённость. Используется для описаний, привычек прошлого ('когда я был маленьким...'). Часто с mentre, da bambino, ogni volta."
    examples:
      - it: "Da bambino giocavo nel parco."
        ru: "В детстве я играл в парке."
        note: "Повторяющееся действие в прошлом"
      - it: "Pioveva quando sono uscito."
        ru: "Шёл дождь, когда я вышел."
        note: "Фоновое описание (imperf.) vs завершённое действие (pass. pross.)"
      - it: "Mentre mangiavo, lui leggeva."
        ru: "Пока я ел, он читал."
        note: "Два параллельных длительных действия"

  - name: "Passato Prossimo"
    short: "P. Pross."
    formula: "avere/essere (в настоящем) + причастие прошедшего времени. Essere — для глаголов движения и изменения состояния, с согласованием причастия в роде и числе."
    usage_ru: "Завершённые действия в прошлом. Основное прошедшее время в разговорной речи. Используется с oggi, ieri, la settimana scorsa. С глаголами движения и изменения состояния используется essere вместо avere."
    examples:
      - it: "Ho mangiato la pizza."
        ru: "Я съел пиццу."
        note: "Завершённое действие, вспомогательный avere"
      - it: "Sono andato al cinema."
        ru: "Я ходил в кино."
        note: "Глагол движения, вспомогательный essere"
      - it: "Ieri ho comprato un libro."
        ru: "Вчера я купил книгу."
        note: "Точное время в прошлом"

  - name: "Passato Remoto"
    short: "P. Rem."
    formula: "Основа + -ai, -asti, -ò, -ammo, -aste, -arono (I спр.); -ei/etti, -esti, -è/ette, -emmo, -este, -erono/ettero (II спр.)"
    usage_ru: "Литературное прошедшее время. В разговорной речи почти не используется на севере, но распространено на юге и в письменных текстах. Описывает завершённые действия в далёком прошлом."
    examples:
      - it: "Dante nacque nel 1265."
        ru: "Данте родился в 1265 году."
        note: "Исторический факт"
      - it: "Andò via senza dire nulla."
        ru: "Он ушёл, ничего не сказав."
        note: "Завершённое действие в повествовании"
      - it: "Il treno partì in orario."
        ru: "Поезд отправился по расписанию."
        note: "Южный вариант разговорной речи"

  - name: "Trapassato Prossimo"
    short: "Trap. P."
    formula: "avevo/ero (в imperfetto) + причастие прошедшего времени. Согласование причастия при essere."
    usage_ru: "Действие, завершённое до другого действия в прошлом ('предпрошедшее'). Часто paired с passato prossimo или imperfetto. Используется в косвенной речи и для хронологии событий."
    examples:
      - it: "Avevo già mangiato quando è arrivato."
        ru: "Я уже поел, когда он пришёл."
        note: "Предпрошедшее: поел раньше, чем пришёл"
      - it: "Era partita prima della pioggia."
        ru: "Она уехала до дождя."
        note: "Действие, предшествующее другому"
      - it: "Ha detto che aveva finito."
        ru: "Он сказал, что закончил."
        note: "Косвенная речь"

  - name: "Futuro Semplice"
    short: "Fut. Sempl."
    formula: "Основа + -erò, -erai, -erà, -eremo, -erete, -eranno (все спряжения)"
    usage_ru: "Действия в будущем. Также используется для предположений о настоящем ('наверное, он дома') и обещаний. С domani, la prossima settimana, tra un'ora."
    examples:
      - it: "Domani andrò al mare."
        ru: "Завтра я поеду на море."
        note: "Реальное будущее действие"
      - it: "Sarà a casa ora."
        ru: "Наверное, он сейчас дома."
        note: "Предположение о настоящем"
      - it: "Ti aiuterò volentieri."
        ru: "Я охотно тебе помогу."
        note: "Обещание"

  - name: "Futuro Anteriore"
    short: "Fut. Ant."
    formula: "avrò/sarò (в futuro semplice) + причастие прошедшего времени"
    usage_ru: "Действие, которое завершится к определённому моменту в будущем ('предбудущее'). Часто с quando, entro, prima di. Также для уверенных предположений о прошлом."
    examples:
      - it: "Entro domani avrò finito il lavoro."
        ru: "К завтрашнему дню я закончу работу."
        note: "Завершение к сроку в будущем"
      - it: "Quando arriverai, avrò già cucinato."
        ru: "Когда ты приедешь, я уже приготовлю."
        note: "Предшествование в будущем"
      - it: "Avrà dimenticato l'appuntamento."
        ru: "Наверное, он забыл о встрече."
        note: "Уверенное предположение о прошлом"

  - name: "Condizionale Presente"
    short: "Cond. Pres."
    formula: "Основа + -erei, -eresti, -erebbe, -eremmo, -ereste, -erebbero (все спряжения)"
    usage_ru: "Гипотетические действия, вежливые просьбы и желания. 'Я бы сделал', 'Не могли бы вы...'. Также в косвенной речи для передачи чужого заявления."
    examples:
      - it: "Vorrei un caffè, per favore."
        ru: "Я хотел бы кофе, пожалуйста."
        note: "Вежливая просьба"
      - it: "Mangerei la pizza volentieri."
        ru: "Я бы охотно съел пиццу."
        note: "Желание"
      - it: "Ha detto che verrebbe."
        ru: "Он сказал, что придёт."
        note: "Косвенная речь (чужое заявление)"

  - name: "Condizionale Passato"
    short: "Cond. Pass."
    formula: "avrei/sarei (в condizionale presente) + причастие прошедшего времени"
    usage_ru: "Нереальные или гипотетические действия в прошлом. 'Я бы сделал, если бы...'. Используется с se + congiuntivo imperfetto/trapassato для условных предложений."
    examples:
      - it: "Avrei mangiato la torta, ma ero a dieta."
        ru: "Я бы съел торт, но был на диете."
        note: "Нереализованное желание"
      - it: "Se avessi avuto tempo, sarei venuto."
        ru: "Если бы у меня было время, я бы пришёл."
        note: "Условное предложение (se + trapassato)"
      - it: "Avrei dovuto studiare di più."
        ru: "Мне следовало бы учиться больше."
        note: "Сожаление о прошлом"

  - name: "Congiuntivo Presente"
    short: "Cong. Pres."
    formula: "Основа + -i, -i, -i, -iamo, -iate, -ino (I спр.); -a, -a, -a, -iamo, -iate, -ano (II спр.)"
    usage_ru: "Сослагательное наклонение настоящего времени. Выражает сомнение, желание, необходимость, эмоцию. Обязательно после che с определёнными глаголами и выражениями (penso che, voglio che, è necessario che)."
    examples:
      - it: "Penso che lui sia bravo."
        ru: "Я думаю, что он хорош."
        note: "Выражение мнения"
      - it: "Voglio che tu venga."
        ru: "Я хочу, чтобы ты пришёл."
        note: "Желание"
      - it: "È importante che studiate."
        ru: "Важно, чтобы вы учились."
        note: "Необходимость"

  - name: "Congiuntivo Imperfetto"
    short: "Cong. Imp."
    formula: "Основа + -assi, -assi, -asse, -assimo, -aste, -assero (I спр.); -essi, -essi, -esse, -essimo, -este, -essero (II спр.)"
    usage_ru: "Сослагательное наклонение прошедшего времени. Используется, когда главный глагол стоит в прошедшем времени (voleva che..., pensava che...). Также в условных предложениях с se ('если бы я знал...')."
    examples:
      - it: "Voleva che io venissi."
        ru: "Он хотел, чтобы я пришёл."
        note: "Прошедший главный глагол → congiuntivo imperfetto"
      - it: "Se avessi fame, mangerei."
        ru: "Если бы я был голоден, я бы поел."
        note: "Условное предложение с se"
      - it: "Credeva che fosse facile."
        ru: "Он думал, что это легко."
        note: "Сомнение в прошлом контексте"

  - name: "Congiuntivo Passato"
    short: "Cong. Pass."
    formula: "abbia/sia (в congiuntivo presente) + причастие прошедшего времени"
    usage_ru: "Сослагательное наклонение для завершённых действий. Используется после выражений сомнения, мнения, эмоции в настоящем, когда подчинённое действие уже завершено ('думаю, что он уже ушёл')."
    examples:
      - it: "Penso che abbia capito."
        ru: "Я думаю, что он понял."
        note: "Завершённое действие в придаточном"
      - it: "È possibile che siano partiti."
        ru: "Возможно, они уехали."
        note: "Сомнение о завершённом действии"
      - it: "Spero che tu abbia finito."
        ru: "Надеюсь, ты закончил."
        note: "Надежда на завершённое действие"
